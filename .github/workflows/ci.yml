name: CI — Horosphere

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  #  BACKEND — PHPUnit (unit + functional)
  # ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests (PHPUnit)
    runs-on: ubuntu-latest

    services:
      db:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: horosphere_test
          MARIADB_USER: horosphere
          MARIADB_PASSWORD: horosphere_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, intl, opcache, xdebug
          coverage: xdebug

      - name: Create .env for CI
        working-directory: api
        run: |
          echo APP_ENV=test >> .env
          echo APP_SECRET=test_secret_key_for_ci >> .env
          echo DATABASE_URL="mysql://horosphere:horosphere_secret@127.0.0.1:3306/horosphere_test?serverVersion=mariadb-10.11.0&charset=utf8mb4" >> .env
          echo JWT_SECRET_KEY="%kernel.project_dir%/config/jwt/private.pem" >> .env
          echo JWT_PUBLIC_KEY="%kernel.project_dir%/config/jwt/public.pem" >> .env
          echo JWT_PASSPHRASE=horosphere_jwt_passphrase >> .env
          echo MAILER_DSN=null://null >> .env
          echo CORS_ALLOW_ORIGIN="^https?://localhost" >> .env
          echo MESSENGER_TRANSPORT_DSN=sync:// >> .env
          echo GOTENBERG_URL=http://localhost:3000 >> .env
          echo APP_FRONTEND_URL=http://localhost >> .env
          echo GOOGLE_MAPS_API_KEY=dummy_key_for_tests >> .env
          echo DEFAULT_URI=http://localhost >> .env

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: api/vendor
          key: composer-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Override DATABASE_URL for CI (127.0.0.1 au lieu de db)
        working-directory: api
        run: |
          echo DATABASE_URL="mysql://horosphere:horosphere_secret@127.0.0.1:3306/horosphere_test?serverVersion=mariadb-10.11.0&charset=utf8mb4" > .env.test.local

      - name: Generate JWT keys
        working-directory: api
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem 4096
          openssl rsa -in config/jwt/private.pem -pubout -out config/jwt/public.pem

      - name: Run migrations
        working-directory: api
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Load fixtures
        working-directory: api
        run: php bin/console doctrine:fixtures:load --no-interaction

      - name: Run PHPUnit tests
        working-directory: api
        run: php bin/phpunit --coverage-text

  # ─────────────────────────────────────────
  #  FRONTEND — Build + Lint + Tests
  # ─────────────────────────────────────────
  frontend-tests:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost/api
          VITE_GOOGLE_MAPS_API_KEY: dummy_key_for_build
        run: npm run build

  # ─────────────────────────────────────────
  #  CD — Build Docker image (sur main)
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          target: dev
          push: false
          tags: horosphere/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: dev
          push: false
          tags: horosphere/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
