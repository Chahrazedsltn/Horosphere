upstream api_backend {
    server api:9000 max_fails=3 fail_timeout=30s;
}

upstream frontend_backend {
    server frontend:5173 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/api/public;

    # ─── API Symfony ────────────────────────────────
    location /api {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass api_backend;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_read_timeout 300;
        internal;
    }

    # ─── Frontend React (Vite dev server) ───────────
    location / {
        proxy_pass http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    300;
        proxy_connect_timeout 10;
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30;
    }

    # ─── Assets statiques ───────────────────────────
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|woff|woff2|ttf|svg|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri @frontend;
    }

    location @frontend {
        proxy_pass http://frontend_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Sécurité ────────────────────────────────────
    location ~ \.php$ {
        return 404;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
