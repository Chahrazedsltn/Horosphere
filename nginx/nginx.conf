# Resolver Docker interne : re-résout les noms de conteneurs toutes les 10s.
# Indispensable quand les conteneurs sont recréés (rebuild) sans restart nginx.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name localhost;
    root /var/www/api/public;

    client_max_body_size 20M;

    # ─── API Symfony (FastCGI) ───────────────────────
    location /api {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        # Variable = résolution DNS dynamique via le resolver ci-dessus
        set $api_upstream "api";
        fastcgi_pass $api_upstream:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_read_timeout 300;
        internal;
    }

    # ─── Frontend React (Vite dev server) ───────────
    location / {
        # Variable = résolution DNS dynamique
        set $frontend_upstream "frontend";
        proxy_pass http://$frontend_upstream:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    300;
        proxy_connect_timeout 10;
    }

    # ─── Assets statiques ───────────────────────────
    location ~* \.(ico|css|js|gif|jpeg|jpg|png|woff|woff2|ttf|svg|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri @frontend;
    }

    location @frontend {
        set $frontend_upstream "frontend";
        proxy_pass http://$frontend_upstream:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Sécurité ────────────────────────────────────
    location ~ \.php$ {
        return 404;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(self)";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.googleapis.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws: wss: https://maps.googleapis.com https://maps.gstatic.com; worker-src blob:; frame-src 'none'; object-src 'none'";

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
