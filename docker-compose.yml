services:
  # ─────────────────────────────────────────
  #  NGINX — Reverse proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: horosphere_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - api_public:/var/www/api/public:ro
    depends_on:
      - api
      - frontend
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  API — Symfony 7
  # ─────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    container_name: horosphere_api
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}?serverVersion=mariadb-10.11.0&charset=utf8mb4
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailpit:1025}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?queue_name=async}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ./api:/var/www/api
      - api_vendor:/var/www/api/vendor
      - api_public:/var/www/api/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  WORKER — Symfony Messenger + Scheduler
  # ─────────────────────────────────────────
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: dev
    container_name: horosphere_worker
    command: >
      sh -c "
        echo 'Attente de la base de données...' &&
        sleep 5 &&
        php bin/console messenger:consume async scheduler_default
          --time-limit=3600
          --memory-limit=256M
          --failure-limit=3
          -vv
      "
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}?serverVersion=mariadb-10.11.0&charset=utf8mb4
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      MAILER_DSN: ${MAILER_DSN:-smtp://mailpit:1025}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN:-doctrine://default?queue_name=async}
      GOTENBERG_URL: ${GOTENBERG_URL:-http://gotenberg:3000}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
    volumes:
      - ./api:/var/www/api
      - api_vendor:/var/www/api/vendor
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  FRONTEND — React 18 + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: horosphere_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      VITE_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      VITE_APP_ENV: ${APP_ENV:-dev}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  DATABASE — MariaDB 10.11
  # ─────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: horosphere_db
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  GOTENBERG — HTML → PDF
  # ─────────────────────────────────────────
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: horosphere_gotenberg
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  MAILPIT — Dev mail catcher
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: horosphere_mail
    ports:
      - "8025:8025"
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  DB BACKUP — Sauvegarde quotidienne MariaDB
  # ─────────────────────────────────────────
  db-backup:
    image: fradelg/mysql-cron-backup:latest
    container_name: horosphere_backup
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASS: ${DB_PASSWORD}
      MYSQL_DB: ${DB_NAME}
      MAX_BACKUPS: ${BACKUP_MAX_KEEP:-7}
      INIT_BACKUP: "1"
      CRON_TIME: ${BACKUP_CRON:-"0 2 * * *"}
      GZIP_LEVEL: "9"
    volumes:
      - db_backups:/backup
    depends_on:
      db:
        condition: service_healthy
    networks:
      - horosphere_net
    restart: unless-stopped

networks:
  horosphere_net:
    driver: bridge

volumes:
  db_data:
  db_backups:
  api_vendor:
  api_public:
  frontend_node_modules:
