##############################################################################
#  docker-compose.prod.yml — Surcharge production avec Traefik + HTTPS
#  Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
##############################################################################
services:
  # ─────────────────────────────────────────
  #  TRAEFIK — Reverse proxy + Let's Encrypt
  # ─────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: horosphere_traefik
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - horosphere_net
    restart: unless-stopped

  # ─────────────────────────────────────────
  #  NGINX — expose via Traefik uniquement
  # ─────────────────────────────────────────
  nginx:
    ports: []  # Traefik gère les ports
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - api_public:/var/www/api/public:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.horosphere.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.horosphere.entrypoints=websecure"
      - "traefik.http.routers.horosphere.tls.certresolver=letsencrypt"
      - "traefik.http.services.horosphere.loadbalancer.server.port=80"
      # Headers de sécurité
      - "traefik.http.middlewares.horosphere-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.horosphere-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.horosphere-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.horosphere-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.horosphere-headers.headers.browserXssFilter=true"
      - "traefik.http.routers.horosphere.middlewares=horosphere-headers"

  # ─────────────────────────────────────────
  #  API — target prod
  # ─────────────────────────────────────────
  api:
    build:
      target: prod
    environment:
      APP_ENV: prod
    volumes:
      # En prod, pas de bind-mount du code source
      - api_public:/var/www/api/public

  # ─────────────────────────────────────────
  #  WORKER — target prod
  # ─────────────────────────────────────────
  worker:
    build:
      target: prod
    environment:
      APP_ENV: prod

  # ─────────────────────────────────────────
  #  FRONTEND — target prod (Nginx statique)
  # ─────────────────────────────────────────
  frontend:
    build:
      target: prod
    environment:
      VITE_APP_ENV: prod

  # ─────────────────────────────────────────
  #  DB — pas d'exposition du port en prod
  # ─────────────────────────────────────────
  db:
    ports: []

volumes:
  letsencrypt:
  api_public:
  db_backups:
